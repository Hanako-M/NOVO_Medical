<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-teal-50 min-h-screen p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold text-teal-700 mb-6">Add New Product</h1>
        
        <!-- Add Product Form -->
        <form id="productForm" class="space-y-4">
            <div>
                <label class="block text-teal-700 font-semibold mb-2">Product Name</label>
                <input type="text" id="name" class="w-full px-4 py-2 border-2 border-teal-200 rounded-lg focus:border-teal-500 focus:outline-none" required>
            </div>

            <div>
                <label class="block text-teal-700 font-semibold mb-2">Description</label>
                <textarea id="description" rows="3" class="w-full px-4 py-2 border-2 border-teal-200 rounded-lg focus:border-teal-500 focus:outline-none" required></textarea>
            </div>

            <div>
                <label class="block text-teal-700 font-semibold mb-2">Image URL</label>
                <input type="text" id="image" class="w-full px-4 py-2 border-2 border-teal-200 rounded-lg focus:border-teal-500 focus:outline-none" required>
            </div>

            <div>
                <label class="block text-teal-700 font-semibold mb-2">Category</label>
                <input type="text" id="category" class="w-full px-4 py-2 border-2 border-teal-200 rounded-lg focus:border-teal-500 focus:outline-none" placeholder="e.g., medicine" required>
            </div>

            <div>
                <label class="block text-teal-700 font-semibold mb-2">Brand</label>
                <input type="text" id="brand" class="w-full px-4 py-2 border-2 border-teal-200 rounded-lg focus:border-teal-500 focus:outline-none" placeholder="e.g., sanofi" required>
            </div>

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg transition">
                Add Product
            </button>
        </form>

        <!-- Message Display -->
        <div id="message" class="mt-4 p-4 rounded-lg hidden"></div>

        <!-- View Products Button -->
        <button onclick="viewProducts()" class="w-full mt-6 bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-lg transition">
            View All Products
        </button>

        <!-- Products List -->
        <div id="productsList" class="mt-6"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000'; // Change to your backend URL
      document.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('authToken');
    console.log('Token sent:', token); // Should print now

    if (!token) {
        alert('You are not logged in!');
        window.location.href = 'signin.html';
        return;
    }
        // Add Product
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const productData = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                image: document.getElementById('image').value,
                category: document.getElementById('category').value,
                brand: document.getElementById('brand').value
            };

            try {
                const response = await fetch(`${API_URL}/admin/postProduct`, {
                    method: 'POST',
                   
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // send token
                    },
                    body: JSON.stringify(productData)
                });

                const data = await response.json();
                showMessage(data.message || 'Product added successfully!', 'success');
                document.getElementById('productForm').reset();
            } catch (error) {
                console.log(error);
                showMessage('Error adding product', 'error');
            }
        });
    });
        // View Products
        async function viewProducts() {
            try {
                const response = await fetch(`${API_URL}/products`, {
                   headers: {
        'Authorization': `Bearer ${token}`
    }
                });

                const data = await response.json();
                displayProducts(data.products);
            } catch (error) {
                showMessage('Error loading products', 'error');
            }
        }

        // Display Products
        function displayProducts(products) {
            const list = document.getElementById('productsList');
            list.innerHTML = '<h2 class="text-2xl font-bold text-teal-700 mb-4">Products</h2>';

            products.forEach(product => {
                list.innerHTML += `
                    <div class="bg-teal-50 p-4 rounded-lg mb-3 border-2 border-teal-200">
                        <h3 class="font-bold text-teal-800">${product.name}</h3>
                        <p class="text-gray-600">${product.description}</p>
                        <p class="text-sm text-teal-600">Category: ${product.category} | Brand: ${product.brand}</p>
                        <button onclick="deleteProduct('${product._id}')" class="mt-2 bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded">
                            Delete
                        </button>
                    </div>
                `;
            });
        }

        // Delete Product
        async function deleteProduct(productid) {
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'DELETE',
                 
                    headers: {
                        'Content-Type': 'application/json',
                         'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ productid })
                });

                const data = await response.json();
                showMessage(data.message, 'success');
                viewProducts();
            } catch (error) {
                showMessage('Error deleting product', 'error');
            }
        }

        // Show Message
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.className = `mt-4 p-4 rounded-lg ${type === 'success' ? 'bg-teal-100 text-teal-700' : 'bg-red-100 text-red-700'}`;
            msg.textContent = text;
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
