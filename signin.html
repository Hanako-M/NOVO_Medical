<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-teal-50 min-h-screen flex items-center justify-center p-8">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold text-teal-700 mb-2 text-center">Welcome Back</h1>
        <p class="text-teal-600 text-center mb-6">Please sign in to continue</p>
        
        <!-- Sign In Form -->
        <form id="signinForm" class="space-y-4">
            <div>
                <label class="block text-teal-700 font-semibold mb-2">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border-2 border-teal-200 rounded-lg focus:border-teal-500 focus:outline-none" required>
            </div>

            <div>
                <label class="block text-teal-700 font-semibold mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border-2 border-teal-200 rounded-lg focus:border-teal-500 focus:outline-none" required>
            </div>

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg transition">
                Sign In
            </button>
        </form>

        <!-- Message Display -->
        <div id="message" class="mt-4 p-4 rounded-lg hidden"></div>

        <!-- Token Display (for testing) -->
        <div id="tokenDisplay" class="mt-4 p-4 bg-teal-50 rounded-lg border-2 border-teal-200 hidden">
            <p class="text-teal-700 font-semibold mb-2">Your Token (saved):</p>
            <p id="tokenText" class="text-sm text-gray-600 break-all"></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000'; // Change to your backend URL

        // Sign In
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const credentials = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/signin`, {
                    method: 'POST',
                    // 🔥 REQUIRED for cookies
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(credentials)
                });

                const data = await response.json();

                if (data.success) {     
                     showMessage('Sign in successful! Token saved.', 'success'); 
                      localStorage.setItem('authToken', data.token); // ✅ store token
                     window.location.href = "postproduct.html";
                   
                } else {
                    showMessage(data.message || 'Sign in failed', 'error');
                }
            } catch (error) {
                showMessage('Error signing in. Please try again.', 'error');
            }
        });

        // Show Message
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.className = `mt-4 p-4 rounded-lg ${type === 'success' ? 'bg-teal-100 text-teal-700' : 'bg-red-100 text-red-700'}`;
            msg.textContent = text;
            msg.classList.remove('hidden');
        }
    </script>
</body>
</html>
